[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM", "LOG"]
ignore = ["E501", "E701", "N806"]

[tool.ruff.lint.per-file-ignores]
"netinsight/tests/**" = ["E402", "N803"]
"manage.py" = ["E402"]
"netinsight/dashboard/views.py" = ["E402"]
"netinsight/classification/train.py" = ["E402"]
"netinsight/optimization/kkt.py" = ["N803"]
